<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assetra - User Management</title>
    <link rel="stylesheet" href="/css/user-management.css">
    <style>
        .header {
            border-bottom: 4px solid #fa3bda;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            position: relative;
            z-index: 100;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="menu-icon menu-toggle">☰</div>
            <h1 class="logo">ASSETRA</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName">User</span>
            <div class="user-avatar"></div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h2 class="page-title">Admin Resource Management</h2>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('users')">Users</button>
            <button class="tab-btn" onclick="switchTab('departments')">Departments</button>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content active">
            <div class="section-header">
                <h3>All Users</h3>
                <button class="add-btn" onclick="openUserModal()">+ Add User</button>
            </div>

            <div id="loadingMessage" class="loading-message">Loading users...</div>
            <div id="errorMessage" class="error-message"></div>

            <div id="usersTableContainer" class="table-container" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Department</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Departments Tab -->
        <div id="departmentsTab" class="tab-content">
            <div class="section-header">
                <h3>Departments</h3>
                <button class="add-btn" onclick="openDepartmentModal()">+ Add Department</button>
            </div>

            <div id="deptLoadingMessage" class="loading-message">Loading departments...</div>
            <div id="deptErrorMessage" class="error-message"></div>

            <div id="departmentsTableContainer" class="table-container" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Department Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="departmentsTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUserModal()">&times;</span>
            <h2 id="userModalTitle">Add User</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Password:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Role:</label>
                    <select id="role" required onchange="toggleDepartment()">
                        <option value="">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Manager">Manager</option>
                        <option value="Viewer">Viewer</option>
                    </select>
                </div>
                <div class="form-group" id="departmentGroup">
                    <label>Department:</label>
                    <select id="department">
                        <option value="">Select Department</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Save</button>
                    <button type="button" class="cancel-btn" onclick="closeUserModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Department Modal -->
    <div id="departmentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeDepartmentModal()">&times;</span>
            <h2 id="deptModalTitle">Add Department</h2>
            <form id="departmentForm">
                <input type="hidden" id="departmentId">
                <div class="form-group">
                    <label>Department Name:</label>
                    <input type="text" id="departmentName" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Save</button>
                    <button type="button" class="cancel-btn" onclick="closeDepartmentModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeResetPasswordModal()">&times;</span>
            <h2>Reset Password</h2>
            <form id="resetPasswordForm">
                <input type="hidden" id="resetUserId">
                <div class="form-group">
                    <label>New Password:</label>
                    <input type="password" id="newPassword" required minlength="6">
                </div>
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Reset Password</button>
                    <button type="button" class="cancel-btn" onclick="closeResetPasswordModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/sidebar.js"></script>
    <script src="/js/user-management.js"></script>
</body>
</html>
