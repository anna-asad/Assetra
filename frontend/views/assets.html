<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assetra - Assets</title>
    <link rel="stylesheet" href="/css/assets.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="menu-icon menu-toggle">☰</div>
            <h1 class="logo">ASSETRA</h1>
        </div>
        <div class="header-center">
            <input type="text" class="search-bar" placeholder="Search assets..." id="searchInput">
        </div>
        <div class="header-right">
            <span class="user-name" id="userName">User</span>
            <div class="user-avatar"></div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
<h2 class="page-title">Manage Assets</h2>
            <div class="header-actions">
                <button class="add-btn" onclick="addNewAsset()">Add Asset</button>
                <button class="action-btn" onclick="assignSelected()">Assign Asset</button>
                <button class="action-btn" onclick="editSelected()">Edit Asset</button>
                <button class="action-btn" onclick="removeSelected()">Remove Asset</button>
            </div>
        </div>

        <div class="filters">
            <select id="statusFilter" class="filter-select">
                <option value="">All Status</option>
                <option value="Available">Available</option>
                <option value="Allocated">Allocated</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Missing">Missing</option>
            </select>
        </div>

        <div class="assets-container">
            <div id="loadingMessage" class="loading-message">Loading assets...</div>
            <div id="errorMessage" class="error-message"></div>
            
            <div id="assetsTable" class="assets-table" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Select</th>
                            <th>Asset Tag</th>
                            <th>Asset Name</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Department</th>
                            <th>Location</th>
                            <th>Assigned To</th>
                        </tr>
                    </thead>
                    <tbody id="assetsTableBody">
                        <!-- Assets will be loaded here -->
                    </tbody>
                </table>
            </div>

            <div id="noAssets" class="no-assets" style="display: none;">
                <p>No assets found</p>
                <button class="add-btn" onclick="addNewAsset()">+ Add Your First Asset</button>
            </div>
        </div>
    </main>

    <!-- Assignment Modal -->
    <div id="assignModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAssignModal()">&times;</span>
            <h2>Assign Asset</h2>
            <form id="assignForm">
                <div class="form-group">
                    <label>Assign To:</label>
                    <select id="assignType" onchange="toggleAssignFields()">
                        <option value="user">Employee</option>
                        <option value="department">Department</option>
                    </select>
                </div>
                
                <div class="form-group" id="userField">
                    <label>Select Employee:</label>
                    <select id="assignedUser" required>
                        <option value="">-- Select Employee --</option>
                    </select>
                </div>
                
                <div class="form-group" id="departmentField" style="display: none;">
                    <label>Select Department:</label>
                    <select id="assignedDepartment">
                        <option value="">-- Select Department --</option>
                        <option value="IT">IT</option>
                        <option value="Operations">Operations</option>
                        <option value="Finance">Finance</option>
                        <option value="HR">HR</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Effective Date:</label>
                    <input type="date" id="effectiveDate" required>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Assign</button>
                    <button type="button" class="cancel-btn" onclick="closeAssignModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/sidebar.js"></script>
    <script src="/js/assets.js"></script>
</body>
</html>
