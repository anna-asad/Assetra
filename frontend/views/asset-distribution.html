<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assetra - Asset Distribution</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/asset-distribution.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="menu-icon menu-toggle">≡</div>
            <h1 class="logo">ASSETRA</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName">User</span>
            <div class="user-avatar"></div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <h2 class="page-title">Asset Distribution Dashboard</h2>
        <p class="department-info" id="departmentInfo">Academic vs Administrative - 4 Status Categories Each</p>
        
        <div class="charts-row" style="display: flex; justify-content: center;">
            <div class="chart-card" style="flex: 1 1 100%; max-width: 1400px; margin: 0 auto;">
                <div style="height: 700px; position: relative;">
                    <canvas id="dapartments"></canvas>
                </div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">Loading charts...</div>
        <div id="error" class="error" style="display: none;"></div>
    </main>

    <script src="/js/sidebar.js"></script>
<script src="/js/role-ui.js"></script>\n    <script src="/js/single-dept-chart.js"></script>\n    <script src="/js/asset-distribution.js"></script>
</body>
</html>
