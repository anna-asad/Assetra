<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assetra - Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <header class="header">
            <div class="header-left">
            <div class="menu-icon menu-toggle">≡</div>
            <h1 class="logo">ASSETRA</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName">User</span>
            <div class="user-avatar"></div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <h2 class="page-title">Dashboard and Statistics</h2>
        <p class="department-info" id="departmentInfo"></p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalAssets">0</div>
                <div class="stat-label">Total Assets</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalAssetValue">₨0</div>
                <div class="stat-label">Total Value</div>
            </div>
                <div class="stat-card">
                <div class="stat-number" id="missingAssets">0</div>
                <div class="stat-label">Missing Assets</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="maintenanceAssets">0</div>
                <div class="stat-label">Assets under Maintenance</div>
            </div>
        </div>

        <div class="dashboard-layout">
            <div class="left-column">
                <div class="chart-card">
                    <h3>Asset Distribution</h3>
                    <div class="chart-placeholder">
                        <div class="bar-chart">
                            <div class="bar">
                                <span class="bar-label">Available</span>
                                <span class="bar-value" id="availableCount">0</span>
                            </div>
                            <div class="bar">
                                <span class="bar-label">Allocated</span>
                                <span class="bar-value" id="allocatedCount">0</span>
                            </div>
                            <div class="bar">
                                <span class="bar-label">Maintenance</span>
                                <span class="bar-value" id="maintenanceCount">0</span>
                            </div>
                            <div class="bar">
                                <span class="bar-label">Missing</span>
                                <span class="bar-value" id="missingCount">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="maintenance-card">
                    <h3>Maintenance Cost</h3>
                    <div class="metric-number-large" id="maintenanceCost">₨0</div>
                </div>
            </div>
            <div class="right-column">
                <div class="metric-card">
                    <h3>Compliance Overview</h3>
                    <div class="metric-item compliance-circle-container">
                        <div class="circle-container">
                            <svg viewBox="0 0 320 320" class="compliance-circle">
                                <circle class="circle-bg" cx="160" cy="160" r="120"></circle>
                                <circle class="circle-progress" cx="160" cy="160" r="120" stroke-dasharray="0 754"></circle>
                            </svg>
                            <div class="circle-text" id="complianceScore">0%</div>
                        </div>
                        <div class="metric-label">Compliance Score</div>
                    </div>

                    <div class="bottom-metrics">
                        <div class="metric-item small-metrics">
                            <div class="metric-label">Audited Assets: <span class="metric-number" id="auditedCount">0</span></div>
                        </div>
                        <div class="metric-item small-metrics">
                            <div class="metric-label">Maintained Assets: <span class="metric-number" id="maintainedCount">0</span></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="/js/sidebar.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
