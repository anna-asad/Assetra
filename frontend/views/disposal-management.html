<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assetra - Disposal Management</title>
    <link rel="stylesheet" href="/css/assets.css">
    <style>
        .header {
            border-bottom: 4px solid #fa3bda;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            position: relative;
            z-index: 100;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left"><h1 class="logo">ASSETRA</h1></div>
        <div class="header-right">
            <span class="user-name" id="userName">User</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>
    <main class="main-content">
        <div class="page-header">
            <h2 class="page-title">Disposal Requests</h2>
        </div>
        <div class="assets-container">
            <div id="requestsTable" class="assets-table">
                <table>
                    <thead>
                        <tr>
                            <th>Asset Tag</th>
                            <th>Asset Name</th>
                            <th>Requested By</th>
                            <th>Reason</th>
                            <th>Suggested Method</th>
                            <th>Level</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="disposalTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="/js/sidebar.js"></script>
    <script src="/js/disposal-management.js"></script>
</body>
</html>
