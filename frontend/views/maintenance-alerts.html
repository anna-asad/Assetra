<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assetra - Maintenance Alerts</title>
    <link rel="stylesheet" href="/css/maintenance-alerts.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="menu-icon menu-toggle">☰</div>
            <h1 class="logo">ASSETRA</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName">User</span>
            <div class="user-avatar"></div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h2 class="page-title">Maintenance Alerts</h2>
            <div class="header-actions">
                <button class="action-btn" onclick="updateHealthScores()">🔄 Update Health Scores</button>
                <button class="back-btn" onclick="goBack()">← Back</button>
            </div>
        </div>

        <div class="alerts-container">
            <div id="loadingMessage" class="loading-message">Loading alerts...</div>
            
            <div id="alertsContent" style="display: none;">
                <div class="alert-summary">
                    <div class="summary-card critical">
                        <div class="card-icon">🚨</div>
                        <div class="card-content">
                            <div class="card-label">Critical Alerts</div>
                            <div class="card-value" id="criticalCount">0</div>
                        </div>
                    </div>
                    <div class="summary-card warning">
                        <div class="card-icon">⚠️</div>
                        <div class="card-content">
                            <div class="card-label">Warning Alerts</div>
                            <div class="card-value" id="warningCount">0</div>
                        </div>
                    </div>
                </div>

                <div class="alerts-list">
                    <h3 class="section-title">Assets Requiring Attention</h3>
                    <div id="noAlerts" class="no-alerts" style="display: none;">
                        <p>✅ No maintenance alerts! All assets are in good condition.</p>
                    </div>
                    <div id="alertsTable" class="table-container" style="display: none;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Priority</th>
                                    <th>Asset Tag</th>
                                    <th>Asset Name</th>
                                    <th>Department</th>
                                    <th>Health Score</th>
                                    <th>Alert Reason</th>
                                    <th>Warranty Expiry</th>
                                    <th>Last Maintenance</th>
                                </tr>
                            </thead>
                            <tbody id="alertsTableBody">
                                <!-- Alerts will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/sidebar.js"></script>
    <script src="/js/maintenance-alerts.js"></script>
</body>
</html>
