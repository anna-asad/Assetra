<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assetra - Profile</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/profile.css">
    <style>
        .header {
            border-bottom: 4px solid #fa3bda;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            position: relative;
            z-index: 100;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="menu-icon menu-toggle">☰</div>
            <h1 class="logo">ASSETRA</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName">User</span>
            <div class="user-avatar"></div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <h2 class="page-title">My Profile</h2>

        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-large">
                        <span id="avatarInitials">U</span>
                    </div>
                    <h3 id="profileName">Loading...</h3>
                    <span class="role-badge" id="profileRole">User</span>
                </div>

                <div class="profile-details">
                    <div class="detail-row">
                        <span class="detail-label">Username:</span>
                        <span class="detail-value" id="profileUsername">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email:</span>
                        <span class="detail-value" id="profileEmail">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Role:</span>
                        <span class="detail-value" id="profileRoleText">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Department:</span>
                        <span class="detail-value" id="profileDepartment">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Account Created:</span>
                        <span class="detail-value" id="profileCreated">-</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/sidebar.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
